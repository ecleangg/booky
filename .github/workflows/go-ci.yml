name: Go CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go test and vet
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: booky_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d booky_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      BOOKY_TEST_POSTGRES_DSN: postgresql://postgres:postgres@localhost:5432/booky_test?sslmode=disable

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./cmd/booky

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
