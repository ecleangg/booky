    standardSettlementDetails:
      type: object
      required:
        - date
        - sumBaseCurrency
      properties:
        date:
          type: string
          format: date
          description: The date of the settlement
        sumBaseCurrency:
          type: number
          format: decimal
          description: The settlement amount in base currency
      example:
        date: 2024-10-15
        sumBaseCurrency: 15.5
    invoiceSettlementRead:
      type: object
      readOnly: true
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the settlement
          readOnly: true
        invoiceId:
          type: string
          format: uuid
          description: The unique identifier of the invoice this settlement belongs to
          readOnly: true
        type:
          type: string
          readOnly: true
          enum:
            - currency
            - bankFee
            - badDebt
            - balanceAdjustment
          description: |
            The type of the settlement.

            - Currency adjustments are for changes in exchange rates. Currency gain or currency loss is reflected in `sumBaseCurrency` being positive or negative respectively.

            - Bank fees are for charges from banks or payment providers.

            - Bad debts are for uncollectible invoices.

            - Balance adjustments are for correcting discrepancies on invoices without affecting bookkeeping.
        invoiceSettlementDetails:
          oneOf:
            - $ref: "#/components/schemas/standardSettlementDetails"
          discriminator:
            propertyName: reason
            mapping:
              currency: "#/components/schemas/standardSettlementDetails"
              bankFee: "#/components/schemas/standardSettlementDetails"
              badDebt: "#/components/schemas/standardSettlementDetails"
              balanceAdjustment: "#/components/schemas/standardSettlementDetails"
          description: The settlement details specific to the settlement type
        journalEntryRef:
          type: object
          nullable: true
          readOnly: true
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
      example:
        id: c529df79-eb7f-5ef0-a8dc-c2b71f953554
        invoiceId: a419cf69-db6f-4de9-992c-b1a60942a443
        type: bankFee
        invoiceSettlementDetails:
          date: 2024-10-15
          sumBaseCurrency: 15.5
        journalEntryRef:
          id: 55c899c5-82b2-4a09-899e-9dc03342b5dc
    invoiceSettlementWrite:
