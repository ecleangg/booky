        required: true
        description: The number of the account
        schema:
          type: integer
          format: int32
    get:
      tags:
        - chart-of-accounts
      summary: Get specific account
      description: |
        Retrieves details of a specific account from the chart of accounts using the account number.

        **Scope:** `chart-of-accounts:read`
      operationId: get-account-with-number
