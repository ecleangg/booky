components:
  securitySchemes:
    tokenAuth:
      type: http
      scheme: bearer
    access_token:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: /token
          scopes: {}
        authorizationCode:
          authorizationUrl: /authorize
          tokenUrl: /token
          scopes:
            invoices:read: Read access to invoices
            invoices:write: Write access to invoices
            customers:read: Read access to customers
            customers:write: Write access to customers
            items:read: Read access to items
            items:write: Write access to items
            journal-entries:read: Read access to journal entries
            journal-entries:write: Write access to journal entries
            uploads:read: Read access to uploads
            uploads:write: Write access to uploads
            fiscal-years:read: Read access to fiscal years
            fiscal-years:write: Write access to fiscal years
            sie-files:read: Read access to sie files
            sie-files:write: Write access to sie files
            chart-of-accounts:read: Read access to chart of accounts
            credit-notes:read: Read access to credit notes
            credit-notes:write: Write access to credit notes
            company-information:read: Read access to company information
    client_auth:
      type: http
      scheme: basic
  schemas:
    pagedResponse:
      type: object
      title: pagedResponse
      properties:
        totalItems:
          type: integer
          format: int32
          example: 1
        totalPages:
          type: integer
          format: int32
          example: 1
        currentPage:
          type: integer
          format: int32
          example: 1
    journalEntryItem:
      type: object
      title: journalEntryItem
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        debit:
          type: number
          format: double
        credit:
          type: number
          format: double
        account:
          type: integer
          format: int32
          example: 1930
      example:
        id: 1
        Credit: 0
        Debit: 200
        Account: 1930
    journalEntry:
      type: object
      title: journalEntry
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
        journalEntryNumber:
          type: string
          readOnly: true
        date:
          type: string
          format: date
        items:
          type: array
          items:
            $ref: "#/components/schemas/journalEntryItem"
        reversingJournalEntryId:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        reversedByJournalEntryId:
          type: string
          format: uuid
          readOnly: true
          nullable: true
      required:
        - items
      example:
        id: a419cf69-db6f-4de9-992c-b1a60942a443
        title: invoice 1234
        journalEntryNumber: V342
        date: 2024-10-10
        items:
          - id: 1
            debit: 200
            credit: 0
            account: 1930
          - id: 2
            debit: 0
            credit: 40
            account: 3011
          - id: 3
            debit: 0
            credit: 160
            account: 2611
    apiError:
      type: object
      title: apiError
      properties:
        code:
          type: string
        message:
          type: string
        bokioErrorId:
          type: string
          format: uuid
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
    upload:
      type: object
      title: upload
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        description:
          type: string
        contentType:
          type: string
        journalEntryId:
          type: string
          format: uuid
          nullable: true
      example:
        id: a419cf69-db6f-4de9-992c-b1a60942a443
        description: example.png
        contentType: img/png
        journalEntryId: 835ba700-b306-4bd9-8447-59207b6b0002
    addressWithCountrySubdivision:
      type: object
      title: addressWithCountrySubdivision
      required:
        - line1
        - city
        - postalCode
        - country
      properties:
        line1:
          type: string
        line2:
          type: string
          nullable: true
        city:
          type: string
        postalCode:
          type: string
        country:
          description: ISO 3166-1 alpha-2 country code
          type: string
          format: country
        countrySubdivision:
          description: ISO 3166-2 subdivision code (e.g. ENG, SCT, WLS, NIR for GB). Currently required for GB (United kingdom) country.
          type: string
          nullable: true
      example:
        line1: 10 Downing Street
        line2: null
        city: London
        postalCode: SW1A 2AA
        country: GB
        countrySubdivision: ENG
    customer:
      type: object
      title: customer
      required:
        - name
        - type
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        type:
          type: string
          enum:
            - company
            - private
        vatNumber:
          type: string
        orgNumber:
          type: string
        paymentTerms:
          type: string
          description: |
            Payment terms for the invoices. Payment terms can both take free text or days, in digits, until the payment is due.

            On the invoice, if a digit is provided it will be suffixed with "days". For example, "30" will be displayed as "30 days" on the invoice. Note that the suffix will, similar to the rest of the invoice, use the language on the customer.
        contactsDetails:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
                nullable: true
                description: Should not be set for new items
              name:
                type: string
              email:
                type: string
              phone:
                type: string
              isDefault:
                type: boolean
        address:
          $ref: "#/components/schemas/addressWithCountrySubdivision"
        language:
          type: string
          description: Default 'sv'
          enum:
            - sv
            - en
        modifiedDateTime:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: The date and time the customer was last modified. Returns null for customers that were changed before this field was introduced.
      example:
        id: 55c899c5-82b2-47fa-9c51-e35fc9b26443
        name: customer 1
        type: company
        vatNumber: SE1234567890
        orgNumber: 123456-7890
        paymentTerms: "30"
        contactsDetails:
          - name: John Doe
            email: john@email.com
            phone: 0927-5631505
            isDefault: true
        address:
          line1: Älvsborgsvägen 10
          line2: null
          city: Göteborg
          postalCode: 123 45
          country: SE
        language: sv
        modifiedDateTime: 2024-10-10T00:00:00Z
    salesInvoiceItem:
      type: object
      title: salesItem
      required:
        - description
        - itemType
        - productType
        - quantity
        - unitPrice
        - taxRate
      properties:
        id:
          type: integer
          format: int64
          nullable: true
          description: Should not be set for new items
        itemRef:
          type: object
          title: itemRef
          nullable: true
          description: |
            Identifier of an existing salesItem to use as a template. Fields itemType and quantity are required. Values in other fields will be overridden by values from this referenced item
          properties:
            id:
              type: string
              format: uuid
              description: Reference to existing salesItem id
              example: 869a69a3-632b-4a09-899e-9dc03342b5dc
            description:
              type: string
              nullable: true
              readOnly: true
        description:
          type: string
        itemType:
          type: string
          enum:
            - salesItem
        productType:
          type: string
          enum:
            - goods
            - services
        unitType:
          type: string
          default: unspecified
          enum:
            - unspecified
            - piece
            - hour
            - day
            - month
            - kilogram
            - gram
            - liter
            - meter
            - centimeter
            - millimeter
            - meterSquared
            - meterCubic
            - mile
            - kilometer
            - gigabyte
            - hectar
            - words
            - year
            - week
            - minute
            - megabyte
            - ton
        quantity:
          type: number
          format: double
          default: 1
        unitPrice:
          type: number
          format: double
        taxRate:
          type: number
          format: double
        bookkeepingAccountNumber:
          type: integer
          nullable: true
          format: int32
          description: Use the `bookkeepingAccountNumber` field in the line items to specify an accounting account other than the account that would be automatically be selected based on the item productType, taxRate, customer and company settings. Accounts that would be automatically selected cannot be set on this field.
      example:
        id: 1
        itemRef:
          id: 55c899c5-82b2-47fa-9c51-e35fc9b26443
          description: Product 1
        description: Product 1
        itemType: salesItem
        productType: goods
        unitType: piece
        quantity: 1
        unitPrice: 100
        taxRate: 25
        bookkeepingAccountNumber: 3389
    descriptionOnlyInvoiceItem:
      type: object
      title: descriptionOnlyItem
      required:
        - description
        - itemType
      properties:
        id:
          type: integer
          format: int64
          nullable: true
          description: Should not be set for new items
        itemRef:
          type: object
          nullable: true
          description: |
            Identifier of an existing descriptionOnlyItem to use as a template. The field itemType is required.
          properties:
            id:
              type: string
              format: uuid
              description: Reference to existing descriptionOnlyItem id
              example: 55c899c5-82b2-47fa-9c51-e35fc9b26443
            description:
              type: string
              nullable: true
              readOnly: true
        description:
          type: string
        itemType:
          type: string
          enum:
            - descriptionOnlyItem
      example:
        id: 2
        itemRef:
          id: e964435e-50ef-4524-a439-05ff87794952
          description: Custom description line
        description: Custom description line
        itemType: descriptionOnlyItem
    invoiceItem:
      type: object
      title: lineItem
      oneOf:
        - $ref: "#/components/schemas/salesInvoiceItem"
        - $ref: "#/components/schemas/descriptionOnlyInvoiceItem"
    address:
      type: object
      title: address
      properties:
        line1:
          type: string
        line2:
          type: string
          nullable: true
        city:
          type: string
        postalCode:
          type: string
        country:
          description: ISO 3166-1 alpha-2 country code
          type: string
          format: country
      example:
        line1: Delivery Street 15
        line2: Floor 2
        city: Stockholm
        postalCode: 123 45
        country: SE
    invoice:
      type: object
      title: invoice
      required:
        - invoiceDate
        - dueDate
        - lineItems
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        type:
          type: string
          default: invoice
          enum:
            - invoice
            - cashInvoice
          description: The type of the invoice can be invoice or cashInvoice. Can only be set to invoice when creating a new invoice and will default to invoice if not set.
        customerRef:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
              readOnly: true
        contactDetailRef:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
              nullable: true
            email:
              type: string
              readOnly: true
              nullable: true
            phone:
              type: string
              readOnly: true
              nullable: true
        invoiceNumber:
          type: string
          readOnly: true
          nullable: true
          description: The invoice number will be generated at the time of publishing the invoice.
        orderNumberReference:
          type: string
          description: The order number associated with the invoice.
        currency:
          description: ISO 4217 currency code
          type: string
          default: SEK
        currencyRate:
          type: number
          format: double
          default: 1
        totalAmount:
          type: number
          format: double
          readOnly: true
        totalTax:
          type: number
          format: double
          readOnly: true
        paidAmount:
          type: number
          format: double
          readOnly: true
        status:
          type: string
          enum:
            - draft
            - published
            - paid
            - overPaid
            - underPaid
            - overdue
            - credited
            - credit
          default: draft
          readOnly: true
        invoiceDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        publishedDateTime:
          type: string
          format: date-time
          description: The date when the credit note was published (null for draft)
          nullable: true
        lineItems:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/invoiceItem"
        billingAddress:
          readOnly: true
          oneOf:
            - $ref: "#/components/schemas/addressWithCountrySubdivision"
        deliveryAddress:
