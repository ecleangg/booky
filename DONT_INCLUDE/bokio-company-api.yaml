          format: uuid
        example: ea9ee4dd-fae3-4aec-a7db-6fc9cc1f8135
      - name: uploadId
        in: path
        required: true
        description: Unique identifier of the upload
        schema:
          type: string
          format: uuid
        example: a419cf69-db6f-4de9-992c-b1a60942a443
    get:
      tags:
        - uploads
      summary: Get an upload
      description: |
        Retrieve the information of the upload with the matching uploadId.

        **Scope:** `uploads:read`
      operationId: get-upload
      responses:
        "200":
          description: upload found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/upload"
              examples:
                upload found:
                  value:
                    id: a419cf69-db6f-4de9-992c-b1a60942a443
                    description: example.png
                    contentType: img/png
                    journalEntryId: 835ba700-b306-4bd9-8447-59207b6b0002
        "404":
          description: upload not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
              examples:
                Error:
                  value:
                    code: not-found
                    message: upload not found
                    bokioErrorId: 9b408943-7a1e-47ac-85a7-ac52b2c210d3
      security:
        - tokenAuth: []
  "/companies/{companyId}/uploads/{uploadId}/download":
    parameters:
      - name: companyId
        in: path
        required: true
        description: Unique identifier of the company
        schema:
          type: string
          format: uuid
        example: ea9ee4dd-fae3-4aec-a7db-6fc9cc1f8135
      - name: uploadId
        in: path
        required: true
        description: Unique identifier of the upload
        schema:
          type: string
          format: uuid
        example: a419cf69-db6f-4de9-992c-b1a60942a443
    get:
      tags:
        - uploads
      summary: Download file data for an upload
      description: |
        Retrieve the file data of the upload with the matching uploadId.

        **Scope:** `uploads:read`
      operationId: download-upload
      responses:
        "200":
          description: Upload file found
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Upload not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
              examples:
                Error:
                  value:
                    code: not-found
                    message: upload not found
                    bokioErrorId: 9b408943-7a1e-47ac-85a7-ac52b2c210d3
      security:
        - tokenAuth: []
  "/companies/{companyId}/customers":
    parameters:
      - name: companyId
        in: path
        required: true
        description: Unique identifier of the company
        schema:
          type: string
          format: uuid
        example: ea9ee4dd-fae3-4aec-a7db-6fc9cc1f8135
    post:
      tags:
        - customers
      summary: Create a customer
      description: |
        Creates a customer for the company.

        **Scope:** `customers:write`
      operationId: post-customer
      requestBody:
        description: Post the necessary fields for the API to create a customer.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/customer"
            examples:
              New customer:
                value:
                  name: customer 1
                  type: company
                  vatNumber: SE1234567890
                  orgNumber: 123456-7890
                  paymentTerms: "30"
                  contactsDetails:
                    - name: John Doe
                      email: john@email.com
                      phone: 0927-5631505
                      isDefault: true
                  address:
                    line1: Älvsborgsvägen 10
                    line2: null
                    city: Göteborg
                    postalCode: 123 45
                    country: SE
                  language: sv
      responses:
        "200":
          description: Customer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/customer"
              examples:
                customer created:
                  value:
                    name: customer 1
                    type: company
                    vatNumber: SE1234567890
                    orgNumber: 123456-7890
                    paymentTerms: "30"
                    contactsDetails:
                      - id: 240a4af0-edfd-47b1-b4ab-f30450eaac19
                        name: John Doe
                        email: john@email.com
                        phone: 0927-5631505
                        isDefault: true
                    address:
                      line1: Älvsborgsvägen 10
                      line2: null
                      city: Göteborg
                      postalCode: 123 45
                      country: SE
                    language: sv
                    modifiedDateTime: 2024-10-10T00:00:00Z
        "400":
          description: Missing required information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
              examples:
                Error:
                  value:
                    code: validation-error
                    message: Validation failed with 3 errors
                    bokioErrorId: 9b408943-7a1e-47ac-85a7-ac52b2c210d3
                    errors:
                      - field: "#/name"
                        message: The name field is required
                      - field: "#/type"
                        message: The type field is required
                      - field: "#/address/country"
                        message: "Invalid country code: XX"
      security:
        - tokenAuth: []
    get:
      tags:
        - customers
      summary: Get customers
      description: |-
        Get all customers for the company. Use the query parameters to filter and navigate through the results.
        **Scope:** `customers:read`
      operationId: get-customer
      parameters:
        - name: page
          in: query
          required: false
          description: Page number
          schema:
            type: integer
            format: int32
            default: 1
        - name: pageSize
          in: query
          required: false
          description: Number of items per page
          schema:
            type: integer
            format: int32
            default: 25
            maximum: 100
        - name: query
          in: query
          required: false
          description: |
            Optional query to filter the data set with supported fields listed below and [available operations](filtering).

            | Field                | Type        |
            | -------------------- | ----------- |
            | name                 | string      |
            | type                 | string      |
            | vatNumber            | string      |
            | orgNumber            | string      |
            | modifiedDateTime     | date-time   |
          schema:
            type: string
          example: name==customer 1
      responses:
        "200":
          description: Customers found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/pagedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/customer"
      security:
        - tokenAuth: []
