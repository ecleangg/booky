          description: Customer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/customer"
              examples:
                Update customer:
                  value:
                    id: 55c899c5-82b2-47fa-9c51-e35fc9b26443
                    name: customer 1
                    type: company
                    vatNumber: SE1234567890
